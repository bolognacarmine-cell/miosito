[build]
  publish = "."

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://unpkg.com https://cdnjs.cloudflare.com https://identity.netlify.com https://connect.facebook.net https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://images.unsplash.com https://raw.githubusercontent.com https://via.placeholder.com https://www.facebook.com https://*.facebook.com https://identity.netlify.com; connect-src 'self' https://api.github.com https://raw.githubusercontent.com https://*.facebook.com https://identity.netlify.com https://unpkg.com https://cdn.tailwindcss.com https://*.netlify.app https://*.netlify.com; frame-src 'self' https://www.google.com https://identity.netlify.com https://www.facebook.com https://*.facebook.com;"
