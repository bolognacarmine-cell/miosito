backend:
  name: git-gateway
  branch: main

locale: "it"
logo_url: "/images/logo.jpg"
display_url: "https://pc-work.it"

media_folder: "images/uploads"
public_folder: "/images/uploads"

extension: json
format: json

collections:
  - name: "prodotti"
    label: "Prodotti"
    folder: "content/prodotti"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titolo", name: "title", widget: "string" }
      - { label: "Categoria", name: "category", widget: "select", options: ["Hardware", "Software", "Accessori", "Altro"] }
      - { label: "Prezzo", name: "price", widget: "string" }
      - { label: "In Evidenza", name: "featured", widget: "boolean", default: false }
      - name: "images"
        label: "Immagini (max 5)"
        widget: "list"
        min: 1
        max: 5
        add_to_top: false
        # Usando 'field' (semplice stringa) e abilitando multiple nella libreria media
        field: { label: "Immagine", name: "image", widget: "image", media_library: { config: { multiple: true } } }
      - { label: "Descrizione", name: "body", widget: "markdown" }

  - name: "servizi"
    label: "Servizi"
    folder: "content/servizi"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titolo", name: "title", widget: "string" }
      - { label: "Icona", name: "icon", widget: "string", hint: "Nome icona Feather (es. tool, monitor, etc.)" }
      - { label: "Descrizione Breve", name: "description", widget: "text" }
      - { label: "Immagine", name: "image", widget: "image" }
      - { label: "Dettagli", name: "body", widget: "markdown" }

  - name: "portfolio"
    label: "Portfolio Siti Web"
    folder: "content/portfolio"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titolo Progetto", name: "title", widget: "string" }
      - { label: "Link", name: "link", widget: "string" }
      - { label: "Immagine Preview", name: "image", widget: "image" }
      - { label: "Descrizione", name: "body", widget: "markdown" }

  - name: "gallery"
    label: "Caroselli Home"
    delete: true
    editor:
      preview: false
    files:
      - name: "home_slides"
        label: "Slide Home Page"
        file: "content/gallery.json"
        fields:
          - name: "slides"
            label: "Immagini Carosello"
            label_add: "Aggiungi immagini"
            widget: "list"
            # Usando 'field' invece di 'fields', la lista diventa di semplici stringhe (immagini)
            field: { label: "Immagine", name: "image", widget: "image", media_library: { config: { multiple: true } } }

  - name: "settings"
    label: "Impostazioni Sito"
    delete: true
    editor:
      preview: false
    files:
      - name: "general"
        label: "Informazioni Generali"
        file: "content/settings.json"
        fields:
          - { label: "Nome Sito", name: "site_name", widget: "string" }
          - { label: "Email Contatto", name: "contact_email", widget: "string" }
          - { label: "Telefono", name: "contact_phone", widget: "string" }
          - { label: "Indirizzo", name: "address", widget: "string" }
          - { label: "WhatsApp Link", name: "whatsapp_link", widget: "string" }
          - { label: "Facebook Link", name: "facebook_link", widget: "string" }
          - { label: "Instagram Link", name: "instagram_link", widget: "string" }
